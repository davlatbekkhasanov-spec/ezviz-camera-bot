name: Deploy Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        run: node scripts/railway-deploy.mjs --deploy-only
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
