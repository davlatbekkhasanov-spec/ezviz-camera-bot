name: Deploy Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
    steps:
      - uses: actions/checkout@v4

      - name: Railway deploy (latest commit)
        if: env.RAILWAY_TOKEN != ''
        run: node scripts/railway-deploy.mjs --deploy-only

      - name: Deploy Hook fallback
        if: env.RAILWAY_TOKEN == '' && env.DEPLOY_HOOK != ''
        run: curl -fsS -X POST "$DEPLOY_HOOK"

      - name: Token yo'q
        if: env.RAILWAY_TOKEN == '' && env.DEPLOY_HOOK == ''
        run: |
          echo "GitHub Secrets: RAILWAY_TOKEN yoki RAILWAY_DEPLOY_HOOK qo'shing"
          echo "Yoki Railway dashboard → ezviz-camera-bot → Redeploy"
          exit 1
